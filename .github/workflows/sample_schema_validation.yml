name: Sample schema validation

on:
  push:
    paths:
      - 'schemas/**'
      - 'examples/schema_samples/**'
      - '.github/workflows/sample_schema_validation.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'examples/schema_samples/**'
      - '.github/workflows/sample_schema_validation.yml'
  workflow_dispatch:

jobs:
  validate-sample-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install jsonschema
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Validate schema sample data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          pairs = {
              'examples/schema_samples/product_profile.synthetic.json': 'schemas/product_profile.schema.json',
              'examples/schema_samples/analytical_method.synthetic.json': 'schemas/analytical_method.schema.json',
              'examples/schema_samples/validation_protocol.synthetic.json': 'schemas/validation_protocol.schema.json',
              'examples/schema_samples/technical_context_card.synthetic.json': 'schemas/technical_context_card.schema.json',
              'examples/schema_samples/analytical_report_gap_assessment.synthetic.json': 'schemas/analytical_report_gap_assessment.schema.json',
          }

          for sample_path, schema_path in pairs.items():
              sample_file = Path(sample_path)
              schema_file = Path(schema_path)

              if not sample_file.exists():
                  raise FileNotFoundError(f'Missing sample file: {sample_file}')
              if not schema_file.exists():
                  raise FileNotFoundError(f'Missing schema file: {schema_file}')

              sample = json.loads(sample_file.read_text(encoding='utf-8'))
              schema = json.loads(schema_file.read_text(encoding='utf-8'))

              validator = Draft202012Validator(schema)
              errors = sorted(validator.iter_errors(sample), key=lambda e: e.path)
              if errors:
                  print(f'Validation failed for {sample_file} against {schema_file}')
                  for error in errors:
                      path = '.'.join(str(part) for part in error.path) or '<root>'
                      print(f'- {path}: {error.message}')
                  raise SystemExit(1)

              print(f'Validated: {sample_file} -> {schema_file}')
          PY
